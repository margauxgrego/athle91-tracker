<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlé 91 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#1a0a2e; --surface:#231040; --card:#2a1448; --border:#3d2060;
  --accent:#f5c400; --accent2:#f97316; --accent3:#e040a0; --red:#ef4444;
  --text:#fff8ee; --muted:#a080c0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(245,196,0,.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(59,130,246,.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.container{max-width:1100px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.login-box{background:rgba(42,20,72,.9);border:1px solid rgba(245,196,0,.2);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 16px 60px rgba(0,0,0,.5);backdrop-filter:blur(12px);}
.login-box .club-logo{margin-bottom:4px;}
.login-box p{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.login-user{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(245,196,0,.2);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s;}
.login-user:hover{border-color:var(--accent);background:rgba(245,196,0,.1);}
.login-user .uname{font-family:'Roboto Mono',monospace;font-size:13px;}
.login-user .urole{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.login-pw{display:none;flex-direction:column;gap:12px;}
.login-pw.show{display:flex;}
.login-pw .back{background:none;border:none;color:var(--muted);font-family:'Roboto Mono',monospace;font-size:11px;cursor:pointer;text-align:left;letter-spacing:1px;margin-bottom:4px;}
.login-pw .back:hover{color:var(--text);}
.login-err{color:var(--red);font-family:'Roboto Mono',monospace;font-size:11px;display:none;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border);margin-bottom:0;}
.topbar-left{display:flex;gap:8px;flex-wrap:wrap;}
.ath-btn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:8px 16px;background:var(--card);border:1.5px solid var(--border);color:var(--muted);cursor:pointer;border-radius:50px;transition:all .2s;}
.ath-btn.active{background:rgba(245,196,0,.15);border-color:var(--accent);color:var(--accent);}
.ath-btn:hover{color:var(--text);}
.ath-btn.coach-add{border-color:rgba(245,196,0,.5);color:var(--accent);}
.logout-btn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:7px 16px;background:none;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;border-radius:50px;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

header{padding:20px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.logo-block h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(36px,6vw,68px);line-height:.9;letter-spacing:2px;}
.logo-block h1 span{color:var(--accent);}
.logo-block p{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.header-records{display:flex;gap:12px;flex-wrap:wrap;}
.record-pill{background:rgba(255,255,255,.05);border:1px solid rgba(245,196,0,.2);border-radius:12px;padding:10px 16px;text-align:center;}
.record-pill .val{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--accent);line-height:1;}
.record-pill .label{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

.tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--border);overflow-x:auto;padding-bottom:0;}
.tab{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:10px 16px;background:none;border:none;color:var(--muted);cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;}
.tab.active{color:var(--accent);font-weight:700;}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.tab:hover{color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid rgba(245,196,0,.12);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.card-title{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.chart-wrap{position:relative;height:250px;}

/* CHART FILTER */
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.filter-btns{display:flex;gap:4px;}
.filter-btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;background:none;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;border-radius:50px;transition:all .15s;}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(245,196,0,.12);}
.filter-btn:hover{color:var(--text);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-family:'Barlow',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid rgba(42,42,58,.5);font-size:13px;}
tr:last-child td{border-bottom:none;}
.perf-val{font-family:'Roboto Mono',monospace;font-weight:500;color:var(--accent);}
.badge{display:inline-block;font-family:'Barlow',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:50px;text-transform:uppercase;}
.badge-r1,.badge-r2,.badge-r3,.badge-r4,.badge-r5,.badge-r6{background:rgba(245,196,0,.15);color:var(--accent);border:1px solid rgba(245,196,0,.3);}
.badge-d1,.badge-d2,.badge-d3,.badge-d7{background:rgba(249,115,22,.15);color:var(--accent2);border:1px solid rgba(249,115,22,.3);}
.rp-badge{display:inline-block;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1a0a2e;border:none;font-weight:700;font-family:'Roboto Mono',monospace;font-size:8px;letter-spacing:1px;padding:1px 5px;border-radius:2px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-group label{display:block;font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.form-group input,.form-group select{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(245,196,0,.2);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Roboto Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);background:rgba(245,196,0,.08);outline:none;}
.form-group select option{background:var(--surface);}
.btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1a0a2e;border:none;border-radius:50px;padding:10px 22px;font-weight:700;font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:opacity .2s,transform .1s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn:active{transform:scale(.98);}
.btn-ghost{background:none;color:var(--red);border:1px solid rgba(204,34,0,.3);padding:4px 8px;font-size:10px;}
.btn-ghost:hover{background:rgba(239,68,68,.1);opacity:1;}
.btn-edit{background:none;color:#f97316;border:1px solid rgba(249,115,22,.3);padding:4px 8px;font-size:10px;margin-right:4px;}
.btn-edit:hover{background:rgba(59,130,246,.1);opacity:1;}

.stat-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stat{flex:1;min-width:85px;background:rgba(255,255,255,.04);border:1px solid rgba(245,196,0,.15);border-radius:12px;padding:14px 16px;}
.stat .n{font-family:'Barlow Condensed',sans-serif;font-size:30px;line-height:1;color:var(--accent);}
.stat .l{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.trend-up{color:var(--accent)!important;}
.trend-down{color:var(--red)!important;}

.records-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.rec-card{background:rgba(255,255,255,.04);border:1px solid rgba(245,196,0,.15);border-radius:12px;padding:14px 16px;}
.rec-card .disc{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.rec-card .perf{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--accent);line-height:1;margin:4px 0;}
.rec-card .meta{font-size:11px;color:var(--muted);}

.hurdles-hero{text-align:center;padding:32px 0 24px;}
.hurdles-counter{font-family:'Barlow Condensed',sans-serif;font-size:100px;line-height:1;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;}
.hurdles-label{font-family:'Roboto Mono',monospace;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.hurdles-since{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);margin-top:10px;}

.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
.legend-dot{width:9px;height:9px;border-radius:50%;}

.empty-state{text-align:center;padding:36px;color:var(--muted);font-family:'Roboto Mono',monospace;font-size:12px;letter-spacing:1px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid rgba(245,196,0,.2);border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.6);backdrop-filter:blur(8px);}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:32px;color:var(--accent);margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.btn-cancel{background:none;color:var(--muted);border:1px solid var(--border);border-radius:50px;padding:10px 18px;font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.btn-cancel:hover{color:var(--text);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:6px">
      <div style="background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:42px;line-height:1;padding:4px 12px;letter-spacing:2px;border-radius:8px">ATHLÉ</div>
      <div style="background:var(--accent);color:#1a0a2e;font-family:'Barlow Condensed',sans-serif;font-size:56px;line-height:1;padding:0 12px;border-radius:8px;font-weight:800">91</div>
    </div>
    <p style="font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Viry-Châtillon</p>
    <p>Choisir un profil</p>
    <div class="login-list" id="login-list"></div>
    <div class="login-pw" id="login-pw">
      <button class="back" onclick="backToList()">← Retour</button>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-err" id="login-err">Mot de passe incorrect</div>
      <button class="btn" onclick="doLogin()">Connexion</button>
    </div>
  </div>
</div>

<!-- MODAL NOUVEL ATHLÈTE (coach only) -->
<div class="modal-overlay" id="modal-new-athlete">
  <div class="modal">
    <h3>Nouvel athlète</h3>
    <div class="form-grid">
      <div class="form-group"><label>Prénom</label><input type="text" id="na-prenom" placeholder="Marie"></div>
      <div class="form-group"><label>Nom</label><input type="text" id="na-nom" placeholder="Dupont"></div>
      <div class="form-group"><label>Née en</label><input type="number" id="na-annee" placeholder="2003"></div>
      <div class="form-group"><label>Catégorie</label><select id="na-cat"><option>ES</option><option>SE</option><option>JU</option><option>CA</option><option>MI</option></select></div>
    </div>
    <div class="form-group" style="margin-bottom:10px"><label>Disciplines</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;" id="disc-checkboxes"></div>
    </div>
    <div class="form-group" style="margin-bottom:10px"><label>Mot de passe initial</label><input type="password" id="na-pw" placeholder="••••••"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-new-athlete')">Annuler</button>
      <button class="btn" onclick="createAthlete()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUTER DISCIPLINE -->
<div class="modal-overlay" id="modal-add-disc">
  <div class="modal">
    <h3>Ajouter une discipline</h3>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;" id="disc-add-checkboxes"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-add-disc')">Annuler</button>
      <button class="btn" onclick="confirmAddDisc()">Ajouter</button>
    </div>
  </div>
</div>

<div class="container" id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left" id="athlete-switcher"></div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <h1 id="header-name">—</h1>
        <p id="header-sub">—</p>
      </div>
      <div class="header-records">
        <div class="record-pill"><div class="val" id="pr-hauteur">—</div><div class="label">PR Hauteur</div></div>
        <div class="record-pill"><div class="val" id="pr-400h">—</div><div class="label">PR 400m H.</div></div>
        <div class="record-pill"><div class="val" id="nb-comps">—</div><div class="label">Compétitions</div></div>
      </div>
    </div>
  </header>

  <div class="tabs" id="main-tabs"></div>
  <div id="tab-contents"></div>
</div>

let charts = {};

// ─── LOGIN ───────────────────────────────────────────────────────────────────

let loginTarget = null;

function buildLoginList() {
  const list = document.getElementById('login-list');
  const all = [
    { key:'coach', name:'Kevin DEI', role:'Coach' },
    ...Object.values(athletes).map(a => ({ key:a.id, name:a.prenom+' '+a.nom, role:'Athlète · '+a.cat }))

      <span class="uname">${u.name}</span>
      <span class="urole">${u.role}</span>

}

function selectUser(key) {
  loginTarget = key;
  document.getElementById('login-list').style.display = 'none';
  const pw = document.getElementById('login-pw');
  pw.classList.add('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').style.display = 'none';
  setTimeout(() => document.getElementById('pw-input').focus(), 50);
}

function backToList() {
  loginTarget = null;
  document.getElementById('login-list').style.display = 'flex';
  document.getElementById('login-list').style.flexDirection = 'column';
  document.getElementById('login-pw').classList.remove('show');
}

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  let ok = false;
  if (loginTarget === 'coach' && pw === users.coach.pw) { ok = true; currentUser = {type:'coach', key:'coach'}; }
  else if (athletes[loginTarget] && pw === athletes[loginTarget].pw) { ok = true; currentUser = {type:'athlete', key:loginTarget}; }

  if (!ok) { document.getElementById('login-err').style.display = 'block'; return; }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  if (currentUser.type === 'athlete') {
    currentAthlete = loginTarget;
    buildApp();
  } else {
    currentAthlete = Object.keys(athletes)[0];
    buildApp();
  }
}

function logout() {
  currentUser = null; currentAthlete = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-list').style.display = 'flex';
  document.getElementById('login-list').style.flexDirection = 'column';
  document.getElementById('login-pw').classList.remove('show');
  buildLoginList();
}

// ─── TABS ───────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tabEl = [...document.querySelectorAll('.tab')].find(t => t.getAttribute('onclick').includes("'"+name+"'"));
  if (tabEl) tabEl.classList.add('active');
  const content = document.getElementById('tab-'+name);
  if (content) content.classList.add('active');
  setTimeout(() => {
    if (name === 'haies_franchies') buildChartHF();
    else if (document.getElementById('chart-'+name)) buildChart(name);
  }, 50);
}

// ─── FILTER ─────────────────────────────────────────────────────────────────

function buildFilters(key, dataArr) {
  const el = document.getElementById('filters-'+key);
  if (!el) return;
  const years = [...new Set(dataArr.map(d => d.date.split('-')[0]))].sort((a,b)=>b-a);
  const current = chartFilters[key] || 'tout';
  el.innerHTML = `
    <button class="filter-btn ${current==='tout'?'active':''}" onclick="setFilter('${key}','tout',this)">Tout</button>
    <button class="filter-btn ${current==='mois'?'active':''}" onclick="setFilter('${key}','mois',this)">Mois</button>
    ${years.map(y=>`<button class="filter-btn ${current===y?'active':''}" onclick="setFilter('${key}','${y}',this)">${y}</button>`).join('')}
  `;
}

function setFilter(key, val, btn) {
  chartFilters[key] = val;
  btn.closest('.filter-btns').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (key === 'hf') buildChartHF();
  else buildChart(key);
}

function filterData(data, filter) {
  const now = new Date();
  if (filter === 'mois') {
    return data.filter(d => {
      const dd = new Date(d.date);
      return dd.getFullYear() === now.getFullYear() && dd.getMonth() === now.getMonth();
    });
  } else if (/^\d{4}$/.test(filter)) {
    return data.filter(d => d.date.startsWith(filter));
  }
  return data;
}

// ─── CHARTS ─────────────────────────────────────────────────────────────────

const baseOpts = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#16161f',borderColor:'#2a2a3a',borderWidth:1,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:12},titleColor:'#6b6b8a',padding:12}},
  scales:{
    x:{grid:{color:'rgba(42,42,58,.5)'},ticks:{color:'#6b6b8a',font:{family:'DM Mono',size:10}},border:{display:false}},
    y:{grid:{color:'rgba(42,42,58,.5)'},ticks:{color:'#6b6b8a',font:{family:'DM Mono',size:10}},border:{display:false}}
  }
};

function buildChart(key) {
  const ath = athletes[currentAthlete];
  const isHeight = ['hauteur','longueur','triple_saut'].includes(key);
  const keyMap2 = {hauteur:'hauteur', longueur:'longueur', triple_saut:'triplesaut', '400m_haies':'haies'};
  const rawData = ath[keyMap2[key] || key] || [];
  const data = filterData([...rawData], chartFilters[key] || 'tout').sort((a,b) => a.date.localeCompare(b.date));
  if (!data.length) return;

  const color = isHeight ? '#f5c400' : '#f97316';
  const pr = isHeight ? Math.max(...data.map(d=>d.val)) : Math.min(...data.map(d=>d.val));

  buildFilters(key, rawData);
  const ctx = document.getElementById('chart-'+key);
  if (!ctx) return;
  if (charts[key]) charts[key].destroy();

  charts[key] = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{
      labels: data.map(d => formatDate(d.date)),
      datasets:[{
        data: data.map(d => d.val),
        borderColor: '#888',
        backgroundColor:'transparent',
        pointBackgroundColor: data.map(d => d.type==='compet'?color:'#ef4444'),
        pointBorderColor: data.map(d => d.type==='compet'?color:'#ef4444'),
        pointRadius: data.map(d => d.val===pr?7:4),
        tension:0.3, fill:false, borderWidth:1.5,
        segment:{ borderColor: ctx2 => data[ctx2.p0DataIndex]?.type==='compet'?color:'#ef4444' }
      }]
    },
    options:{
      ...baseOpts,
      plugins:{...baseOpts.plugins, tooltip:{...baseOpts.plugins.tooltip, bodyColor:color,
        callbacks:{label:c => isHeight ? c.raw+' cm' : formatTime(c.raw)}}},
      scales:{...baseOpts.scales, y:{...baseOpts.scales.y,
        reverse: !isHeight,
        ticks:{...baseOpts.scales.y.ticks, callback:v => isHeight?v+' cm':formatTime(v)}}}
    }
  });
}

function buildChartHF() {
  const ath = athletes[currentAthlete];
  const rawData = filterData([...ath.haiesFranchies], chartFilters['hf'] || 'tout').sort((a,b) => a.date.localeCompare(b.date));
  const ctx = document.getElementById('chart-hf');
  if (!ctx) return;
  buildFilters('hf', ath.haiesFranchies);
  if (charts['hf']) charts['hf'].destroy();
  if (!rawData.length) return;
  let cumul = 0;
  const cumulData = rawData.map(d => { cumul += d.val; return cumul; });
  charts['hf'] = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{
      labels: rawData.map(d => formatDate(d.date)),
      datasets:[{data:cumulData, borderColor:'#f5c400', backgroundColor:'rgba(245,196,0,.07)', pointBackgroundColor:'#f5c400', pointRadius:5, tension:0.3, fill:true, borderWidth:2}]
    },
    options:{...baseOpts, plugins:{...baseOpts.plugins, tooltip:{...baseOpts.plugins.tooltip, bodyColor:'#f5c400', callbacks:{label:c=>c.raw+' haies cumulées'}}}}
  });
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function renderAll() {
  const ath = athletes[currentAthlete];
  // Header
  const parts = ath.prenom.toUpperCase().split('');
  const mid = Math.floor(parts.length/2);
  document.getElementById('header-name').innerHTML = ath.prenom.toUpperCase().slice(0,mid)+'<span>'+ath.prenom.toUpperCase().slice(mid)+' '+ath.nom+'</span>';
  document.getElementById('header-sub').textContent = ath.sub;

  ath.disciplines.forEach(d => {
    const key = d.toLowerCase().replace(/ /g,'_').replace('é','e');
    const distDiscs = ['Hauteur','Longueur','Triple Saut'];
    renderPerf(key, distDiscs.includes(d));
  });
  renderHF();
  renderRecords();
  updateHeader();
}

function renderPerf(key, isHeight) {
  const ath = athletes[currentAthlete];
  const isDistField = ['hauteur','longueur','triplesaut'].includes(key);
  const dataKey = key === 'hauteur' ? 'hauteur' : key === 'longueur' ? 'longueur' : key === 'triple_saut' ? 'triplesaut' : 'haies';
  const sorted = [...(ath[dataKey]||[])].sort((a,b) => b.date.localeCompare(a.date));
  const pr = sorted.length ? (isDistField ? Math.max(...sorted.map(d=>d.val)) : Math.min(...sorted.map(d=>d.val))) : 0;
  const last = sorted[0], prev = sorted[1];
  const diff = last && prev ? +(last.val - prev.val).toFixed(isHeight?0:2) : 0;
  const color = isHeight ? '#f5c400' : '#f97316';

  if (key === 'hauteur') document.getElementById('pr-hauteur').textContent = pr ? cmToM(pr) : '—';
  else if (key === '400m_haies') document.getElementById('pr-400h').textContent = pr ? formatTime(pr) : '—';

  const fmtVal = v => isDistField ? cmToM(v) : formatTime(v);
  const statsEl = document.getElementById('stats-'+key);
  if (statsEl) statsEl.innerHTML = `
    <div class="stat"><div class="n" style="color:${color}">${pr?fmtVal(pr):'—'}</div><div class="l">Record perso</div></div>
    <div class="stat"><div class="n">${last?fmtVal(last.val):'—'}</div><div class="l">Dernière perf.</div></div>
    <div class="stat"><div class="n ${diff>0&&isDistField?'trend-up':diff<0&&!isDistField?'trend-up':diff!==0?'trend-down':''}">${diff>0?'+':''}${diff||'—'}</div><div class="l">vs précédente</div></div>
    <div class="stat"><div class="n">${(ath[dataKey]||[]).filter(d=>d.type==='compet').length}</div><div class="l">Compétitions</div></div>`;

  const tbody = document.getElementById('table-'+key);
  if (tbody) tbody.innerHTML = sorted.map(d => {
    const isPR = d.val === pr;
    const lvl = d.niveau ? `<span class="badge badge-${d.niveau.toLowerCase()}">${d.niveau}</span>` : '—';
    const typeColor = d.type==='compet'?color:'#ef4444';
    return `<tr>
      <td>${formatDate(d.date)}</td>
      <td><span class="perf-val" style="color:${color}">${isDistField?cmToM(d.val):formatTime(d.val)}</span>${isPR?'<span class="rp-badge">RP</span>':''}</td>
      <td><span style="font-size:11px;color:${typeColor}">${d.type==='compet'?'Compét.':'Entraîn.'}</span></td>
      <td>${lvl}</td>
      <td style="color:var(--muted);font-size:12px">${d.lieu||'—'}</td>
      <td><button class="btn btn-ghost" onclick="delPerf('${dataKey}',${d.id})">✕</button></td>
    </tr>`;
  }).join('');

  buildChart(key);
}

function renderHF() {
  const ath = athletes[currentAthlete];
  const sorted = [...ath.haiesFranchies].sort((a,b) => a.date.localeCompare(b.date));
  const total = ath.haiesFranchies.reduce((s,d)=>s+d.val,0);
  const countEl = document.getElementById('hurdles-count');
  const sinceEl = document.getElementById('hurdles-since');
  const tbody = document.getElementById('table-hf');
  if (!countEl) return;
  countEl.textContent = total;
  if (sinceEl) sinceEl.textContent = ath.haiesTotalSince ? 'Depuis le '+ath.haiesTotalSince : '';
  if (tbody) tbody.innerHTML = [...sorted].reverse().map(d => `<tr>
    <td>${formatDate(d.date)}</td>
    <td><span class="perf-val">+${d.val}</span></td>
    <td><span style="font-size:11px;color:var(--muted)">${d.type||'—'}</span></td>
    <td style="font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted)">${d.dist}</td>
    <td style="color:var(--muted);font-size:12px">${d.note||'—'}</td>
    <td><button class="btn btn-ghost" onclick="delHF(${d.id})">✕</button></td>
  </tr>`).join('') || '<tr><td colspan="6" class="empty-state">Aucune entrée</td></tr>';
  buildChartHF();
}

function renderRecords() {
  const el = document.getElementById('records-grid');
  if (!el) return;
  el.innerHTML = athletes[currentAthlete].records.map(r => `
    <div class="rec-card"><div class="disc">${r.disc}</div><div class="perf">${r.perf}</div><div class="meta">${r.date} · ${r.cat}</div></div>`).join('');
}

function updateHeader() {
  const ath = athletes[currentAthlete];
  const total = ['hauteur','longueur','triplesaut','haies'].reduce((s,k)=>(s + (ath[k]||[]).filter(d=>d.type==='compet').length),0);
  document.getElementById('nb-comps').textContent = total;
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────

function addPerf(key, disc) {
  const isHeight = disc === 'Hauteur';
  const date = document.getElementById(key+'-date').value;
  const val = parseFloat(document.getElementById(key+'-val').value);
  const type = document.getElementById(key+'-type').value;
  const lieu = document.getElementById(key+'-lieu').value;
  const niveau = document.getElementById(key+'-niveau')?.value || '';
  if (!date || !val) { alert('Date et valeur requis'); return; }
  const dataKey = disc === 'Hauteur' ? 'hauteur' : disc === 'Longueur' ? 'longueur' : disc === 'Triple Saut' ? 'triplesaut' : 'haies';
  if (!athletes[currentAthlete][dataKey]) athletes[currentAthlete][dataKey] = [];
  athletes[currentAthlete][dataKey].push({id:nextId++,date,val,type,lieu,niveau});
  document.getElementById(key+'-val').value='';
  document.getElementById(key+'-lieu').value='';
  if (document.getElementById(key+'-niveau')) document.getElementById(key+'-niveau').value='';
  renderPerf(key, isHeight);
  updateHeader();
}

function addHF() {
  const date = document.getElementById('hf-date').value;
  const val = parseInt(document.getElementById('hf-val').value);
  const type = document.getElementById('hf-type').value;
  const dist = document.getElementById('hf-dist').value;
  const note = document.getElementById('hf-note').value;
  if (!date || !val || val<0) { alert('Date et nombre de haies requis'); return; }
  if (!athletes[currentAthlete].haiesTotalSince) athletes[currentAthlete].haiesTotalSince = formatDate(date);
  athletes[currentAthlete].haiesFranchies.push({id:nextId++,date,val,type,dist,note});
  document.getElementById('hf-val').value='';
  document.getElementById('hf-note').value='';
  renderHF();
}

function delPerf(dataKey, id) {
  athletes[currentAthlete][dataKey] = (athletes[currentAthlete][dataKey]||[]).filter(d=>d.id!==id);
  const keyMap = {hauteur:'hauteur', longueur:'longueur', triplesaut:'triple_saut', haies:'400m_haies'};
  renderPerf(keyMap[dataKey]||dataKey, ['hauteur','longueur','triplesaut'].includes(dataKey));
  updateHeader();
}

function delHF(id) {
  athletes[currentAthlete].haiesFranchies = athletes[currentAthlete].haiesFranchies.filter(d=>d.id!==id);
  renderHF();
}

// ─── ATHLETE SWITCH ──────────────────────────────────────────────────────────

function switchAthlete(key) {
  currentAthlete = key;
  charts = {};
  document.querySelectorAll('.ath-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+key+"'"));
  });
  buildTabs();
  renderAll();
}

// ─── COACH: NOUVEL ATHLÈTE ───────────────────────────────────────────────────

function openModal(id) {
  // Build discipline checkboxes
  const wrap = document.getElementById('disc-checkboxes');
  if (wrap) wrap.innerHTML = DISCIPLINES_ALL.map(d => `
    <label style="display:flex;align-items:center;gap:5px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--border);padding:5px 10px;border-radius:3px;">
      <input type="checkbox" value="${d}" style="accent-color:var(--accent)"> ${d}
    </label>`).join('');
  document.getElementById(id).classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function createAthlete() {
  const prenom = document.getElementById('na-prenom').value.trim();
  const nom = document.getElementById('na-nom').value.trim();
  const annee = parseInt(document.getElementById('na-annee').value);
  const cat = document.getElementById('na-cat').value;
  const pw = document.getElementById('na-pw').value;
  const discs = [...document.querySelectorAll('#disc-checkboxes input:checked')].map(i=>i.value);

  if (!prenom || !nom || !pw || !discs.length) { alert('Prénom, nom, disciplines et mot de passe requis'); return; }

  const id = (prenom+nom).toLowerCase().replace(/\s/g,'');
  athletes[id] = {
    id, prenom, nom, annee, cat, pw,
    disciplines: discs,
    sub: `Athlé 91 · ${cat} · née ${annee}`,
    records:[], hauteur:[], haies:[], haiesFranchies:[], haiesTotalSince:null
  };

  closeModal('modal-new-athlete');
  buildSwitcher();
  switchAthlete(id);
  buildLoginList();

  // Clear form
  ['na-prenom','na-nom','na-annee','na-pw'].forEach(i => document.getElementById(i).value='');
}

// ─── UTILS ───────────────────────────────────────────────────────────────────

function cmToM(cm){return Math.floor(cm/100)+'m'+String(cm%100).padStart(2,'0');}
function formatDate(d){
  const [y,m,day]=d.split('-');
  const M=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  return `${parseInt(day)} ${M[parseInt(m)-1]} ${y}`;
}
function formatTime(s){
  const min=Math.floor(s/60),sec=(s%60).toFixed(2).padStart(5,'0');
  return min>0?`${min}'${sec}"`:parseFloat(s).toFixed(2)+'"';
}

// ─── PARAMS ──────────────────────────────────────────────────────────────────

function saveParams() {
  const ath = athletes[currentAthlete];
  ath.prenom = document.getElementById('p-prenom').value.trim() || ath.prenom;
  ath.nom = document.getElementById('p-nom').value.trim() || ath.nom;
  ath.annee = parseInt(document.getElementById('p-annee').value) || ath.annee;
  ath.cat = document.getElementById('p-cat').value;
  ath.sub = `Athlé 91 · ${ath.cat} · née ${ath.annee}`;
  buildSwitcher();
  buildTabs();
  renderAll();
  switchTab('parametres');
  alert('Informations mises à jour');
}

function changePassword() {
  const pw1 = document.getElementById('p-pw1').value;
  const pw2 = document.getElementById('p-pw2').value;
  const msg = document.getElementById('pw-msg');
  if (!pw1 || pw1.length < 4) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Mot de passe trop court (min 4 caractères)'; return; }
  if (pw1 !== pw2) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Les mots de passe ne correspondent pas'; return; }
  athletes[currentAthlete].pw = pw1;
  buildLoginList();
  msg.style.display='block'; msg.style.color='var(--accent)'; msg.textContent='Mot de passe mis à jour ✓';
  document.getElementById('p-pw1').value=''; document.getElementById('p-pw2').value='';
}

// ─── DELETE ATHLETE ──────────────────────────────────────────────────────────

function deleteAthlete(key) {
  const a = athletes[key];
  if (!confirm(`Supprimer ${a.prenom} ${a.nom} et toutes ses données ?`)) return;
  delete athletes[key];
  // Switch to first remaining athlete
  const remaining = Object.keys(athletes);
  if (!remaining.length) { logout(); return; }
  currentAthlete = remaining[0];
  buildSwitcher();
  buildTabs();
  renderAll();
  buildLoginList();
}

// ─── ADD DISCIPLINE ──────────────────────────────────────────────────────────

function openAddDisc() {
  const ath = athletes[currentAthlete];
  const wrap = document.getElementById('disc-add-checkboxes');
  const available = DISCIPLINES_ALL.filter(d => !ath.disciplines.includes(d));
  if (!available.length) { alert('Toutes les disciplines sont déjà ajoutées'); return; }
  wrap.innerHTML = available.map(d => `
    <label style="display:flex;align-items:center;gap:5px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--border);padding:5px 10px;border-radius:3px;">
      <input type="checkbox" value="${d}" style="accent-color:var(--accent)"> ${d}
    </label>`).join('');
  openModal('modal-add-disc');
}

function confirmAddDisc() {
  const selected = [...document.querySelectorAll('#disc-add-checkboxes input:checked')].map(i=>i.value);
  if (!selected.length) { alert('Sélectionne au moins une discipline'); return; }
  selected.forEach(d => {
    if (!athletes[currentAthlete].disciplines.includes(d)) {
      athletes[currentAthlete].disciplines.push(d);
    }
  });
  closeModal('modal-add-disc');
  charts = {};
  buildTabs();
  renderAll();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

buildLoginList();
const today = new Date().toISOString().split('T')[0];
</script>
