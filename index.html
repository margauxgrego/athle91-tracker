<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#f5c400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Athlé 91">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Athlé 91 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f5;--surface:#fff;--card:#fff;--border:#e0e0e0;
  --red:#e53935;--yellow:#f5c400;--orange:#f5a623;
  --text:#111;--muted:#888;--accent:#f5c400;--accent2:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}

/* ── LOGIN ─────────────────────────────── */
#login-screen{position:fixed;inset:0;background:#ececec;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
.logo-badge{display:inline-flex;align-items:stretch;border-radius:10px;overflow:hidden;margin-bottom:14px;}
.logo-athle{background:#f5c400;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;padding:8px 16px;letter-spacing:3px;line-height:1;}
.logo-91{background:#f5a623;color:#000;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;padding:8px 14px;line-height:1;}
.login-subtitle{font-size:10px;color:#999;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;font-weight:600;}
.login-step{display:none;flex-direction:column;gap:8px;}
.login-step.show{display:flex;}
.login-user{display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .2s;}
.login-user:hover{border-color:var(--yellow);background:rgba(245,196,0,.1);}
.login-user .uname{font-size:14px;font-weight:600;color:#111;}
.login-user .urole{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.login-back{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-align:left;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.login-back:hover{color:var(--text);}
.login-pw-wrap{display:flex;flex-direction:column;gap:10px;}
.login-err{color:var(--red);font-size:11px;display:none;}

/* ── TOPBAR ─────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:2px solid var(--yellow);gap:8px;flex-wrap:wrap;background:var(--bg);}
.topbar-left{display:flex;gap:6px;flex-wrap:wrap;}
.ath-btn{font-size:12px;font-weight:700;text-transform:uppercase;padding:6px 14px;background:#f0f0f0;border:1.5px solid #ddd;color:#888;cursor:pointer;border-radius:6px;transition:all .2s;letter-spacing:.3px;}
.ath-btn.active{background:var(--yellow);border-color:var(--yellow);color:#000;}
.ath-btn:hover{color:#111;}
.ath-btn.coach-add{border-color:var(--yellow);color:var(--yellow);}
.logout-btn{font-size:11px;font-weight:700;text-transform:uppercase;padding:6px 14px;background:none;border:1.5px solid #ddd;color:#888;cursor:pointer;border-radius:6px;letter-spacing:.5px;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── HEADER ─────────────────────────────── */
header{padding:14px 0 16px;border-bottom:1px solid #e0e0e0;margin-bottom:16px;border-left:3px solid var(--yellow);padding-left:24px;}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo-block{display:flex;flex-direction:column;gap:4px;}
.logo-inline{display:inline-flex;align-items:stretch;border-radius:6px;overflow:hidden;margin-bottom:4px;}
.logo-inline .la{background:var(--yellow);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;padding:3px 7px;letter-spacing:2px;line-height:1;}
.logo-inline .l9{background:var(--orange);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;padding:3px 7px;line-height:1;}
.header-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,64px);font-weight:900;line-height:1;letter-spacing:1px;color:#111;}
.header-name span{color:var(--yellow);}
.header-sub{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.header-records{display:flex;gap:8px;flex-wrap:wrap;}
.record-pill{background:#fff;border:2px solid var(--yellow);border-radius:8px;padding:8px 14px;text-align:center;min-width:80px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.record-pill .val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--yellow);line-height:1;}
.record-pill .label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;font-weight:700;}

/* ── TABS ─────────────────────────────── */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #e0e0e0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;background:none;border:none;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
.tab.active{color:#000;background:var(--yellow);border-bottom-color:var(--yellow);font-weight:800;}
.tab:hover:not(.active){color:#111;}
.tab-content{display:none;width:100%;}
.tab-content.active{display:block;width:100%;}

/* ── GRID ─────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:#fff;border:1px solid #e8e8e8;border-top:3px solid var(--yellow);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);margin-bottom:14px;}
.chart-wrap{position:relative;height:260px;}

/* ── CHART FILTERS ─────────────────── */
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;}
.filter-btn{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;background:none;border:1.5px solid #ddd;color:#999;cursor:pointer;border-radius:4px;transition:all .15s;}
.filter-btn.active{border-color:var(--yellow);color:#000;background:var(--yellow);}
.filter-btn.f-compet.active{background:var(--red);border-color:var(--red);color:#fff;}
.filter-btn.f-entrainement.active{background:var(--yellow);border-color:var(--yellow);color:#000;}

/* ── TABLE ─────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;scrollbar-width:none;}
.table-wrap::-webkit-scrollbar{display:none;}
table{width:100%;min-width:440px;border-collapse:collapse;font-size:13px;}
th{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);text-align:left;padding:8px 10px;border-bottom:2px solid var(--yellow);white-space:nowrap;}
td{padding:10px 10px;border-bottom:1px solid #efefef;font-size:13px;vertical-align:middle;white-space:nowrap;color:#111;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.perf-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--yellow);}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.badge-r1,.badge-r2,.badge-r3,.badge-r4,.badge-r5,.badge-r6{background:rgba(245,196,0,.15);color:var(--yellow);border:1px solid rgba(245,196,0,.4);}
.badge-d1,.badge-d2,.badge-d3,.badge-d7,.badge-d{background:rgba(245,166,35,.12);color:var(--orange);border:1px solid rgba(245,166,35,.3);}
.rp-badge{display:inline-block;background:var(--yellow);color:#000;font-size:8px;font-weight:900;padding:1px 5px;border-radius:2px;text-transform:uppercase;margin-left:5px;vertical-align:middle;letter-spacing:.5px;}

/* ── TYPE COLORS ─────────────────── */
.type-compet{color:var(--red);font-size:11px;font-weight:700;}
.type-entrainement{color:var(--yellow);font-size:11px;font-weight:700;}

/* ── FORMS ─────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-col{display:flex;flex-direction:column;gap:8px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-group label{display:block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:4px;}
.form-group input,.form-group select{width:100%;background:#f5f5f5;border:1.5px solid #ddd;border-radius:6px;padding:9px 11px;color:#111;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--yellow);}
.form-group select option{background:#fff;color:#111;}
.btn{background:var(--yellow);color:#000;border:none;border-radius:6px;padding:10px 20px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;width:100%;margin-top:4px;}
.btn:hover{opacity:.85;}
.btn:active{transform:scale(.98);}
.btn-ghost{background:none;color:var(--red);border:1px solid rgba(239,68,68,.35);padding:4px 8px;font-size:11px;border-radius:4px;cursor:pointer;font-weight:700;}
.btn-ghost:hover{background:rgba(239,68,68,.1);}
.btn-cancel{background:none;color:#888;border:1px solid #ddd;border-radius:6px;padding:9px 18px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}

/* ── STATS ─────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat{background:#f9f9f9;border:1px solid #e8e8e8;border-left:3px solid var(--yellow);border-radius:8px;padding:12px 14px;}
.stat .n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;color:var(--yellow);}
.stat .l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-top:3px;}
.trend-up{color:var(--yellow)!important;}
.trend-down{color:var(--red)!important;}

/* ── LEGEND ─────────────────────── */
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#999;font-weight:600;}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* ── RECORDS ─────────────────────── */
.records-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.records-filters label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-right:4px;}
.records-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.rec-card{background:#fff;border:1px solid #e8e8e8;border-bottom:3px solid var(--yellow);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.rec-card:hover{border-color:var(--yellow);background:#fffbf0;box-shadow:0 2px 8px rgba(245,196,0,.15);}
.rec-card.open{border-color:var(--orange);}
.rec-card .disc{font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.rec-card .disc-label{font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.rec-card .perf{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--yellow);line-height:1;margin:4px 0;}
.rec-card .meta{font-size:10px;color:#888;}
.rec-history{display:none;background:#fafafa;border:1px solid #efefef;border-radius:8px;padding:12px;margin-top:8px;}
.rec-history.show{display:block;}
.rec-history table{min-width:0;width:100%;}
.rec-history th,.rec-history td{font-size:11px;padding:6px 8px;}

/* ── HAIES ─────────────────────── */
.hurdles-hero{text-align:center;padding:28px 0 20px;}
.hurdles-counter{font-family:'Barlow Condensed',sans-serif;font-size:96px;font-weight:900;line-height:1;color:var(--orange);}
.hurdles-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#888;margin-top:6px;font-weight:700;}
.hurdles-since{font-size:11px;color:#888;margin-top:8px;}

/* ── MODAL ─────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border:1px solid #e8e8e8;border-top:3px solid var(--yellow);border-radius:12px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#111;margin-bottom:18px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.disc-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.disc-pill label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#888;cursor:pointer;background:#f5f5f5;border:1px solid #ddd;padding:5px 10px;border-radius:4px;transition:all .15s;}
.disc-pill label:hover{border-color:var(--yellow);color:#111;}
.disc-pill input:checked+span{color:var(--yellow);}
.disc-pill label:has(input:checked){background:rgba(245,196,0,.1);border-color:var(--yellow);}

/* ── EMPTY STATE ─────────────────── */
.empty-state{text-align:center;padding:36px;color:#888;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* ── PARAMS ─────────────────────── */
.danger-zone{border:1px solid rgba(229,57,53,.25);background:#fff5f5;border-radius:8px;padding:16px;margin-top:8px;}
.danger-zone p{font-size:13px;color:#888;margin-bottom:14px;}

/* ═══ DESKTOP LARGE (>1200px) ═══════════════ */
@media(min-width:1200px){
  .container{padding:0 40px;}
  .chart-wrap{height:320px;}
  .stat .n{font-size:36px;}
  .grid-2{gap:24px;}
  .stat-row{grid-template-columns:repeat(4,1fr);gap:12px;}
  .records-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
  header{padding:20px 0 22px;margin-bottom:24px;}
  .tabs{margin-bottom:20px;}
  .tab{font-size:13px;padding:12px 18px;}
  .card{padding:22px;margin-bottom:20px;}
  table{font-size:14px;}
  th{font-size:10px;padding:10px 14px;}
  td{padding:12px 14px;font-size:14px;}
}

/* ═══ DESKTOP STANDARD (768px–1200px) ═══════════════ */
@media(min-width:768px) and (max-width:1199px){
  .container{padding:0 24px;}
  .chart-wrap{height:280px;}
  .stat-row{grid-template-columns:repeat(4,1fr);gap:10px;}
  .stat .n{font-size:30px;}
  .records-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
}

/* ═══ TABLET (641px–767px) ═══════════════ */
@media(min-width:641px) and (max-width:767px){
  .container{padding:0 16px;}
  .chart-wrap{height:240px;}
  .grid-2{grid-template-columns:1fr 1fr;gap:12px;}
  .stat-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat .n{font-size:26px;}
  .records-grid{grid-template-columns:repeat(3,1fr);}
  .tab{font-size:11px;padding:9px 12px;}
}

/* ═══ MOBILE (≤640px) ═══════════════ */
@media(max-width:640px){

  /* ── Base ── */
  html,body{overflow-x:hidden;}
  .container{padding:0 12px;width:100%;max-width:100%;}

  /* ── Login ── */
  #login-screen{padding:16px;align-items:flex-start;padding-top:10vh;}
  .login-box{padding:24px 18px;border-radius:14px;max-width:100%;}
  .logo-athle,.logo-91{font-size:22px;padding:6px 12px;}

  /* ── Topbar — scroll horizontal, ne wrap pas ── */
  .topbar{padding:8px 0;flex-wrap:nowrap;align-items:center;}
  .topbar-left{
    flex:1;
    display:flex;
    flex-wrap:nowrap;
    gap:4px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .topbar-left::-webkit-scrollbar{display:none;}
  .ath-btn{font-size:10px;padding:5px 10px;white-space:nowrap;flex-shrink:0;}
  .logout-btn{font-size:10px;padding:5px 10px;white-space:nowrap;flex-shrink:0;}

  /* ── Header ── */
  header{padding:10px 0 10px;margin-bottom:10px;padding-left:12px;}
  .header-inner{
    flex-direction:column;
    align-items:stretch;
    gap:8px;
  }
  .logo-inline .la,.logo-inline .l9{font-size:12px;padding:2px 6px;}
  .header-name{font-size:clamp(22px,7vw,30px);}
  .header-sub{font-size:9px;}
  .header-records{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
  }
  .record-pill{padding:6px 4px;min-width:0;}
  .record-pill .val{font-size:15px;}
  .record-pill .label{font-size:7px;letter-spacing:0;}

  /* ── Tabs — ne bougent PAS verticalement ── */
  .tabs{
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    flex-wrap:nowrap;
    margin-bottom:12px;
    /* iOS: scroll horizontal uniquement */
    touch-action:pan-x;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{font-size:11px;padding:8px 11px;white-space:nowrap;flex-shrink:0;}

  /* ── Grid → 1 colonne ── */
  .grid-2{grid-template-columns:1fr;gap:8px;margin-bottom:8px;}

  /* ── Cards ── */
  .card{padding:12px;margin-bottom:8px;border-radius:8px;}
  .card-title{font-size:9px;letter-spacing:1.5px;margin-bottom:10px;}

  /* ── Stats → 2 colonnes ── */
  .stat-row{
    display:grid!important;
    grid-template-columns:1fr 1fr;
    gap:6px;
    margin-bottom:10px;
  }
  .stat{padding:9px 10px;}
  .stat .n{font-size:20px;}
  .stat .l{font-size:8px;}

  /* ── Chart ── */
  .chart-wrap{height:180px;}
  .chart-header{flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:8px;}
  .filter-row{gap:3px;flex-wrap:wrap;}
  .filter-btn{font-size:9px;padding:3px 7px;}

  /* ── Legend ── */
  .legend{gap:8px;margin-bottom:6px;}
  .legend-item{font-size:9px;}

  /* ── Tables — scroll horizontal ── */
  .table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    touch-action:pan-x;
  }
  .table-wrap::-webkit-scrollbar{display:none;}
  table{min-width:360px;}
  th{font-size:8px;padding:6px 7px;}
  td{font-size:12px;padding:7px 7px;}
  .perf-val{font-size:13px;}
  .badge{font-size:8px;padding:1px 5px;}
  .rp-badge{font-size:7px;padding:1px 4px;}
  .btn-ghost{padding:3px 6px;font-size:10px;}

  /* ── Formulaires — 1 colonne totale, inputs grands ── */
  .form-row-2{grid-template-columns:1fr;gap:8px;}
  .form-col{gap:8px;}
  .form-grid{grid-template-columns:1fr;gap:8px;}
  .form-group label{font-size:9px;margin-bottom:4px;}
  .form-group input,
  .form-group select{
    font-size:16px; /* évite zoom iOS */
    padding:12px;
    width:100%;
    border-radius:6px;
  }
  .btn{font-size:13px;padding:12px;width:100%;margin-top:4px;}

  /* ── Haies franchies ── */
  .hurdles-hero{padding:16px 0 12px;}
  .hurdles-counter{font-size:60px;}
  .hurdles-label{font-size:10px;}

  /* ── Records ── */
  .records-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .rec-card{padding:10px;}
  .rec-card .disc{font-size:9px;}
  .rec-card .perf{font-size:18px;}
  .rec-card .meta{font-size:9px;}
  .rec-history th,.rec-history td{font-size:10px;padding:5px 6px;}

  /* ── Modal ── */

function discKey(d){return d.toLowerCase().replace(/ /g,'_').replace(/[^a-z0-9_]/g,'');}
function dataKey(d){
  const k=discKey(d);
  if(k==='hauteur')return'hauteur';
  if(k==='longueur')return'longueur';
  if(k==='triple_saut'||k==='triplesaut')return'triplesaut';
  if(k==='400m_haies'||k==='400mhaies')return'haies';
  if(k==='80m_haies'||k==='80mhaies')return'm80haies';
  if(k==='100m')return'm100';
  if(k==='200m')return'm200';
  if(k==='400m')return'm400';
  if(k==='50m')return'm50';
  if(k==='poids')return'poids';
  if(k==='disque')return'disque';
  if(k.includes('haies'))return'haies';
  return k;
}
function isDistDisc(d){return['Hauteur','Longueur','Triple Saut'].includes(d);}
function isTimeDisc(d){return!isDistDisc(d)&&!d.includes('Poids')&&!d.includes('Disque')&&!d.includes('Marteau')&&!d.includes('Javelot');}

function initFilter(k,data){
  if(!chartFilters[k])chartFilters[k]={period:'tout',view:'les2'};
  const years=[...new Set(data.map(d=>d.date.split('-')[0]))].sort((a,b)=>b-a);
  const el=document.getElementById('period-filters-'+k);
  if(!el)return;
  const cur=chartFilters[k].period;
  el.innerHTML=`<button class="filter-btn ${cur==='tout'?'active':''}" onclick="setPeriod('${k}','tout',this)">Tout</button>`+
    years.map(y=>`<button class="filter-btn ${cur===y?'active':''}" onclick="setPeriod('${k}','${y}',this)">${y}</button>`).join('');
}

function setPeriod(k,val,btn){
  if(!chartFilters[k])chartFilters[k]={period:'tout',view:'les2'};
  chartFilters[k].period=val;
  btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(k==='hf')buildChartHF();else buildChart(k);
}

function setView(k,val,btn){
  if(!chartFilters[k])chartFilters[k]={period:'tout',view:'les2'};
  chartFilters[k].view=val;
  btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(k);
}

function filterByPeriod(data,period){
  if(/^\d{4}$/.test(period))return data.filter(d=>d.date.startsWith(period));
  return data;
}

function getGlobalYRange(disc){
  // Compute min/max across ALL athletes for this discipline type
  const dk=dataKey(disc);
  const dist=isDistDisc(disc);
  const isTime=isTimeDisc(disc);
  let allVals=[];
  Object.values(athletes).forEach(ath=>{
    (ath[dk]||[]).forEach(d=>allVals.push(d.val));
    // Also HIST
    const hk=Object.keys(HIST).find(k=>ath.prenom.includes(k));
    if(hk&&HIST[hk][disc])HIST[hk][disc].forEach(d=>allVals.push(d.val));
  });
  if(!allVals.length)return null;
  const mn=Math.min(...allVals);
  const mx=Math.max(...allVals);
  const pad=(mx-mn)*0.15||5;
  return{min:Math.floor(mn-pad), max:Math.ceil(mx+pad)};
}

  const train=filtered.filter(d=>d.type!=='compet').sort((a,b)=>a.date.localeCompare(b.date));

  // Shared X axis: all unique dates sorted chronologically
  const allDates=[...new Set(filtered.map(d=>d.date))].sort((a,b)=>a.localeCompare(b));
  const labels=allDates.map(d=>formatDate(d));

  // Map each dataset to the shared labels (null where no data)
  const mapToLabels=(data)=>allDates.map(date=>{
    const entry=data.find(d=>d.date===date);
    return entry?entry.val:null;
  });

  const ctx=document.getElementById('chart-'+k);
  if(!ctx)return;
  if(charts[k])charts[k].destroy();

  const datasets=[];
  if(view==='les2'||view==='compet'){
    datasets.push({
      label:'Compétition',
      data:mapToLabels(compet),
      borderColor:'#ef4444',
      backgroundColor:'rgba(239,68,68,.06)',
      pointBackgroundColor: allDates.map(date=>compet.find(d=>d.date===date)?'#ef4444':'transparent'),
      pointRadius: allDates.map(date=>compet.find(d=>d.date===date)?5:0),
      pointHoverRadius:7,
      tension:0.3,fill:false,borderWidth:2,
      spanGaps:false,
    });
  }
  if(view==='les2'||view==='entrainement'){
    datasets.push({
      label:'Entraînement',
      data:mapToLabels(train),
      borderColor:'#f5c400',
      backgroundColor:'rgba(245,196,0,.06)',
      pointBackgroundColor: allDates.map(date=>train.find(d=>d.date===date)?'#f5c400':'transparent'),
      pointRadius: allDates.map(date=>train.find(d=>d.date===date)?5:0),
      pointHoverRadius:7,
      tension:0.3,fill:false,borderWidth:2,
      spanGaps:false,
    });
  }

  const fmtVal=v=>dist?cmToM(v):formatVal(disc,v);

  charts[k]=new Chart(ctx.getContext('2d'),{
    type:'line',
    data:{labels,datasets},
    options:{...baseOpts,
      plugins:{...baseOpts.plugins,
        legend:{display:true,labels:{color:'#888',font:{family:'Barlow',size:11},boxWidth:10,padding:12}},
        tooltip:{...baseOpts.plugins.tooltip,
          mode:'index',intersect:false,
          callbacks:{
            label:c=>c.raw!=null?c.dataset.label+': '+fmtVal(c.raw):null,
            filter:item=>item.raw!=null,
          }
        }
      },
      scales:{...baseOpts.scales,
        x:{...baseOpts.scales.x,ticks:{...baseOpts.scales.x.ticks,maxRotation:45,autoSkip:true,maxTicksLimit:10}},
        y:(()=>{
          const range=getGlobalYRange(disc);
          return {
            ...baseOpts.scales.y,
            reverse:!dist&&isTime,
            ...(range?{min:range.min,max:range.max}:{}),
            ticks:{...baseOpts.scales.y.ticks,callback:v=>dist?v+' cm':formatVal(disc,v)}
          };
        })()
      }
    }
  });
}

function buildChartHF(){
  const ath=athletes[currentAthlete];
  if(!chartFilters['hf'])chartFilters['hf']={period:'tout',view:'les2'};
  const allData=ath.haiesFranchies||[];
  initFilter('hf',allData);
  const filtered=filterByPeriod([...allData],chartFilters['hf'].period).sort((a,b)=>a.date.localeCompare(b.date));
  const ctx=document.getElementById('chart-hf');
  if(!ctx)return;
  if(charts['hf'])charts['hf'].destroy();
  if(!filtered.length)return;
  let cum=0;
  const cumulData=filtered.map(d=>{cum+=d.val;return cum;});
  charts['hf']=new Chart(ctx.getContext('2d'),{
    type:'line',
    data:{labels:filtered.map(d=>formatDate(d.date)),datasets:[{
      data:cumulData,borderColor:'#f5c400',backgroundColor:'rgba(245,196,0,.06)',
      pointBackgroundColor:'#f5c400',pointRadius:5,tension:0.3,fill:true,borderWidth:2,
    }]},
    options:{...baseOpts,plugins:{...baseOpts.plugins,tooltip:{...baseOpts.plugins.tooltip,callbacks:{label:c=>c.raw+' haies cumulées'}}}}
  });
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────
function renderAll(){
  const ath=athletes[currentAthlete];
  // Header
  const parts=ath.prenom.toUpperCase();
  document.getElementById('header-name').innerHTML=parts.slice(0,Math.ceil(parts.length/2))+'<span>'+parts.slice(Math.ceil(parts.length/2))+' '+ath.nom+'</span>';
  document.getElementById('header-sub').textContent=ath.sub;
  // Update header PRs dynamically
  updateHeaderKPIs();
  // Disciplines
  ath.disciplines.forEach(d=>renderPerf(discKey(d),d));
  renderHF();
  renderRecords();
}

function updateHeaderKPIs(){
  const ath=athletes[currentAthlete];
  // PR Hauteur
  const hData=ath.hauteur||[];
  const prH=hData.length?Math.max(...hData.map(d=>d.val)):0;
  document.getElementById('pr-hauteur').textContent=prH?cmToM(prH):'—';
  // PR 400m Haies
  const haData=ath.haies||[];
  const prHa=haData.length?Math.min(...haData.map(d=>d.val)):0;
  document.getElementById('pr-400h').textContent=prHa?formatTime(prHa):'—';
  // Compéts total
  const total=['hauteur','haies','longueur','triplesaut',...(ath.disciplines.map(d=>dataKey(d)))]
    .filter((v,i,a)=>a.indexOf(v)===i)
    .reduce((s,k)=>s+(ath[k]||[]).filter(d=>d.type==='compet').length,0);
  document.getElementById('nb-comps').textContent=total||'—';
}

function renderPerf(k,disc){
  const ath=athletes[currentAthlete];
  const dk=dataKey(disc);
  const allData=ath[dk]||[];
  const sorted=[...allData].sort((a,b)=>b.date.localeCompare(a.date));
  const dist=isDistDisc(disc);
  const isTime=isTimeDisc(disc);
  const pr=allData.length?(dist?Math.max(...allData.map(d=>d.val)):isTime?Math.min(...allData.map(d=>d.val)):Math.max(...allData.map(d=>d.val))):0;
  const last=sorted[0],prev=sorted[1];
  const diff=last&&prev?+(last.val-prev.val).toFixed(2):0;
  const fmtPr=v=>dist?cmToM(v):isTime?formatTime(v):v+' cm';
  const statsEl=document.getElementById('stats-'+k);
  if(statsEl)statsEl.innerHTML=`
    <div class="stat"><div class="n">${pr?fmtPr(pr):'—'}</div><div class="l">Record perso</div></div>
    <div class="stat"><div class="n">${last?fmtPr(last.val):'—'}</div><div class="l">Dernière perf.</div></div>
    <div class="stat"><div class="n ${diff>0&&(dist||!isTime)?'trend-up':diff<0&&isTime?'trend-up':diff!==0?'trend-down':''}">${diff>0?'+':''}${diff||'—'}</div><div class="l">vs précédente</div></div>
    <div class="stat"><div class="n">${allData.filter(d=>d.type==='compet').length}</div><div class="l">Compétitions</div></div>`;
  const tbody=document.getElementById('table-'+k);
  if(tbody)tbody.innerHTML=sorted.map(d=>{
    const isRP=d.val===pr;
    const lvl=d.niveau?`<span class="badge badge-${d.niveau.toLowerCase()}">${d.niveau}</span>`:'—';
    return`<tr>
      <td data-label="Date">${formatDate(d.date)}</td>
      <td data-label="Perf."><span class="perf-val">${fmtPr(d.val)}</span>${isRP?'<span class="rp-badge">RP</span>':''}</td>
      <td data-label="Type"><span class="${d.type==='compet'?'type-compet':'type-entrainement'}">${d.type==='compet'?'Compét.':'Entraîn.'}</span></td>
      <td data-label="Niveau">${lvl}</td>
      <td data-label="Lieu" style="color:#888;font-size:12px">${d.lieu||'—'}</td>
      <td data-label="Action"><button class="btn-ghost" onclick="delPerf('${dk}','${k}','${disc}',${JSON.stringify(d.id)})">✕</button></td>
    </tr>`;
  }).join('');
  buildChart(k);
  updateHeaderKPIs();
}

function renderHF(){
  const ath=athletes[currentAthlete];
  const sorted=[...(ath.haiesFranchies||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const total=sorted.reduce((s,d)=>s+d.val,0);
  const countEl=document.getElementById('hurdles-count');
  const sinceEl=document.getElementById('hurdles-since');
  const tbody=document.getElementById('table-hf');
  if(countEl)countEl.textContent=total;
  if(sinceEl)sinceEl.textContent=ath.haiesTotalSince?'Depuis le '+ath.haiesTotalSince:'';
  if(tbody)tbody.innerHTML=[...sorted].reverse().map(d=>`<tr>
    <td data-label="Date">${formatDate(d.date)}</td>
    <td data-label="Haies"><span class="perf-val">+${d.val}</span></td>
    <td data-label="Type"><span class="${d.type==='compet'?'type-compet':'type-entrainement'}">${d.type}</span></td>
    <td data-label="Distance" style="color:#888;font-size:12px">${d.dist}</td>
    <td data-label="Note" style="color:#888;font-size:12px">${d.note||'—'}</td>
    <td data-label="Action"><button class="btn-ghost" onclick="delHF(${JSON.stringify(d.id)})">✕</button></td>
  </tr>`).join('')||'<tr><td colspan="6" class="empty-state">Aucune entrée</td></tr>';
  buildChartHF();
}

function renderRecords(){
  const ath=athletes[currentAthlete];
  const grid=document.getElementById('records-grid');
  const sel=document.getElementById('rec-year-filter');
  if(!grid||!sel)return;
  // Build year options from performances + HIST
  const years=new Set();
  ['hauteur','haies','longueur','triplesaut',...ath.disciplines.map(d=>dataKey(d))].forEach(k=>{
    (ath[k]||[]).forEach(p=>years.add(p.date.split('-')[0]));
  });
  // Also from HIST
  const histKey=Object.keys(HIST).find(k=>ath.prenom.includes(k));
  if(histKey){
    Object.values(HIST[histKey]).forEach(arr=>arr.forEach(e=>years.add(e.date.split('-')[0])));
  }
  const curVal=sel.value||'tout';
  sel.innerHTML='<option value="tout">Toutes</option>'+[...years].sort((a,b)=>b-a).map(y=>`<option value="${y}" ${curVal===y?'selected':''}>${y}</option>`).join('');

  const discDisplayNames={'Poids':'Poids 3kg','Disque':'Disque 1kg'};
  grid.innerHTML=ath.records.map((r,i)=>`
    <div class="rec-card" id="rec-${i}" onclick="toggleRecHistory(${i},'${r.disc}')">
      <div class="disc">${discDisplayNames[r.disc]||r.disc}</div>
      <div class="perf">${r.perf}</div>
      <div class="meta">${r.date} · ${r.cat}</div>
      <div class="rec-history" id="rec-hist-${i}"></div>
    </div>`).join('');
}

function getAllDataForDisc(disc){
  const ath=athletes[currentAthlete];
  const dk=dataKey(disc);
  let data=[...(ath[dk]||[])];
  // Also check longueur for Maria (she has it directly)
  // data is already pulled from dk

  // Normalize disc name for HIST lookup — handle variations
  const normalize=s=>s.toLowerCase()
    .replace(/\s*\(.*?\)/g,'')  // remove parentheses
    .replace(/[^a-z0-9]/g,'')   // remove special chars
    .trim();

  const histKey=Object.keys(HIST).find(k=>ath.prenom.includes(k));
  if(histKey){
    // Find matching key in HIST by normalized name
    const normDisc=normalize(disc);
    const matchKey=Object.keys(HIST[histKey]).find(k=>normalize(k)===normDisc);
    if(matchKey){
      HIST[histKey][matchKey].forEach(e=>{
        if(!data.find(d=>d.date===e.date&&d.val===e.val)){
          data.push({id:'h'+Math.random(),...e});
        }
      });
    }
  }
  return data;
}

function toggleRecHistory(i,disc){
  const el=document.getElementById('rec-hist-'+i);
  const card=document.getElementById('rec-'+i);
  if(el.classList.contains('show')){el.classList.remove('show');card.classList.remove('open');return;}
  const year=document.getElementById('rec-year-filter')?.value||'tout';
  let data=getAllDataForDisc(disc);
  if(year!=='tout')data=data.filter(d=>d.date.startsWith(year));
  data=[...data].sort((a,b)=>b.date.localeCompare(a.date));
  if(!data.length){el.innerHTML='<div class="empty-state" style="padding:12px">Aucune donnée</div>';el.classList.add('show');card.classList.add('open');return;}
  const dist=isDistDisc(disc),isTime=isTimeDisc(disc);
  const fmt=v=>dist?cmToM(v):isTime?formatTime(v):v;
  el.innerHTML=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="min-width:0;width:100%;min-width:260px">
    <thead><tr><th>Date</th><th>Perf.</th><th>Type</th><th>Lieu</th></tr></thead>
    <tbody>${data.map(d=>`<tr>
      <td data-label="Date" style="white-space:nowrap">${formatDate(d.date)}</td>
      <td data-label="Perf."><span class="perf-val" style="font-size:13px">${fmt(d.val)}</span></td>
      <td data-label="Type"><span class="${d.type==='compet'?'type-compet':'type-entrainement'}">${d.type==='compet'?'Compét.':'Entraîn.'}</span></td>
      <td data-label="Lieu" style="color:#888;font-size:11px">${d.lieu||'—'}</td>
    </tr>`).join('')}</tbody></table></div>`;
  el.classList.add('show');card.classList.add('open');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────
function addPerf(k,disc){
  const val=parseFloat(document.getElementById(k+'-val').value);
  const date=document.getElementById(k+'-date').value;
  const type=document.getElementById(k+'-type').value;
  const lieu=document.getElementById(k+'-lieu').value;
  const niveau=document.getElementById(k+'-niveau')?.value||'';
  if(!date||!val){alert('Date et valeur requis');return;}
  const dk=dataKey(disc);
  if(!athletes[currentAthlete][dk])athletes[currentAthlete][dk]=[];
  athletes[currentAthlete][dk].push({id:nextId++,date,val,type,lieu,niveau});
  document.getElementById(k+'-val').value='';
  document.getElementById(k+'-lieu').value='';
  if(document.getElementById(k+'-niveau'))document.getElementById(k+'-niveau').value='';
  renderPerf(k,disc);
}

function addHF(){
  const date=document.getElementById('hf-date').value;
  const val=parseInt(document.getElementById('hf-val').value);
  const type=document.getElementById('hf-type').value;
  const dist=document.getElementById('hf-dist').value;
  const note=document.getElementById('hf-note').value;
  if(!date||!val||val<0){alert('Date et nombre de haies requis');return;}
  if(!athletes[currentAthlete].haiesTotalSince)athletes[currentAthlete].haiesTotalSince=formatDate(date);
  if(!athletes[currentAthlete].haiesFranchies)athletes[currentAthlete].haiesFranchies=[];
  athletes[currentAthlete].haiesFranchies.push({id:nextId++,date,val,type,dist,note});
  document.getElementById('hf-val').value='';
  document.getElementById('hf-note').value='';
  renderHF();
}

function delPerf(dk,k,disc,id){
  athletes[currentAthlete][dk]=(athletes[currentAthlete][dk]||[]).filter(d=>d.id!==id);
  renderPerf(k,disc);
}

function delHF(id){
  athletes[currentAthlete].haiesFranchies=(athletes[currentAthlete].haiesFranchies||[]).filter(d=>d.id!==id);
  renderHF();
}

function removeDisc(disc){
  if(!confirm(`Supprimer la discipline "${disc}" et toutes ses données ?`))return;
  const ath=athletes[currentAthlete];
  ath.disciplines=ath.disciplines.filter(d=>d!==disc);
  const dk=dataKey(disc);
  ath[dk]=[];
  charts={};
  buildTabs();
  renderAll();
}

// ─── PARAMS ──────────────────────────────────────────────────────────────
function saveParams(){
  const ath=athletes[currentAthlete];
  ath.prenom=document.getElementById('p-prenom').value.trim()||ath.prenom;
  ath.nom=document.getElementById('p-nom').value.trim()||ath.nom;
  ath.annee=parseInt(document.getElementById('p-annee').value)||ath.annee;
  ath.cat=document.getElementById('p-cat').value;
  ath.sub=`Athlé 91 · ${ath.cat} · née ${ath.annee}`;
  buildSwitcher();buildTabs();renderAll();switchTab('parametres');
  alert('Informations mises à jour');
}

function changePassword(){
  const pw1=document.getElementById('p-pw1').value;
  const pw2=document.getElementById('p-pw2').value;
  const msg=document.getElementById('pw-msg');
  if(!pw1||pw1.length<4){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Min 4 caractères';return;}
  if(pw1!==pw2){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Les mots de passe ne correspondent pas';return;}
  athletes[currentAthlete].pw=pw1;
  msg.style.display='block';msg.style.color='var(--yellow)';msg.textContent='Mis à jour ✓';
  document.getElementById('p-pw1').value='';document.getElementById('p-pw2').value='';
}

function deleteAthlete(key){
  if(!confirm(`Supprimer ${athletes[key].prenom} ${athletes[key].nom} ?`))return;
  delete athletes[key];
  const remaining=Object.keys(athletes);
  if(!remaining.length){logout();return;}
  currentAthlete=remaining[0];
  buildSwitcher();buildTabs();renderAll();
}

// ─── ADD/REMOVE DISCIPLINE ────────────────────────────────────────────────
function openAddDisc(){
  const ath=athletes[currentAthlete];
  const avail=DISCIPLINES_ALL.filter(d=>!ath.disciplines.includes(d));
  if(!avail.length){alert('Toutes les disciplines sont déjà ajoutées');return;}
  document.getElementById('disc-add-checkboxes').innerHTML=avail.map(d=>`
    <div class="disc-pill"><label><input type="checkbox" value="${d}"><span> ${d}</span></label></div>`).join('');
  openModal('modal-add-disc');
}

function confirmAddDisc(){
  const selected=[...document.querySelectorAll('#disc-add-checkboxes input:checked')].map(i=>i.value);
  if(!selected.length){alert('Sélectionne au moins une discipline');return;}
  const ath=athletes[currentAthlete];
  selected.forEach(d=>{
    if(!ath.disciplines.includes(d)){
      ath.disciplines.push(d);
      // Inject historical data
      const histKey=Object.keys(HIST).find(k=>ath.prenom.includes(k));
      if(histKey&&HIST[histKey][d]){
        const dk=dataKey(d);
        if(!ath[dk])ath[dk]=[];
        HIST[histKey][d].forEach(e=>ath[dk].push({id:nextId++,...e}));
      }
    }
  });
  closeModal('modal-add-disc');
  charts={};buildTabs();renderAll();
}

// ─── MODALS ──────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

function createAthlete(){
  const prenom=document.getElementById('na-prenom').value.trim();
  const nom=document.getElementById('na-nom').value.trim();
  const annee=parseInt(document.getElementById('na-annee').value);
  const cat=document.getElementById('na-cat').value;
  const pw=document.getElementById('na-pw').value;
  const discs=[...document.querySelectorAll('#disc-checkboxes input:checked')].map(i=>i.value);
  if(!prenom||!nom||!pw||!discs.length){alert('Prénom, nom, disciplines et mot de passe requis');return;}
  const id=(prenom+nom).toLowerCase().replace(/\s/g,'');
  athletes[id]={id,dbId:null,prenom,nom,annee,cat,pw,disciplines:discs,
    sub:`Athlé 91 · ${cat} · née ${annee}`,records:[],
    hauteur:[],haies:[],longueur:[],triplesaut:[],haiesFranchies:[],haiesTotalSince:null};
  closeModal('modal-new-athlete');
  buildSwitcher();switchAthlete(id);
  ['na-prenom','na-nom','na-annee','na-pw'].forEach(i=>document.getElementById(i).value='');
}

// ─── UTILS ──────────────────────────────────────────────────────────────
function cmToM(cm){return Math.floor(cm/100)+'m'+String(cm%100).padStart(2,'0');}
function formatDate(d){
  const [y,m,day]=d.split('-');
  const M=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  return`${parseInt(day)} ${M[parseInt(m)-1]} ${y}`;
}
function formatTime(s){
  const min=Math.floor(s/60),sec=(s%60).toFixed(2).padStart(5,'0');
  return min>0?`${min}'${sec}"`:parseFloat(s).toFixed(2)+'"';
}
function formatVal(disc,v){
  if(isDistDisc(disc))return cmToM(v);
  if(isTimeDisc(disc))return formatTime(v);
  return v+' cm';
}
